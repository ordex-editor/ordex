name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LSP servers needed for tests
        run: |
          sudo apt-get update
          sudo apt-get install clangd python3-pylsp gopls wl-clipboard xclip weston xvfb
          sudo pip install ruff ty
          sudo npm install -g typescript-language-server

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Start clipboard test displays
        run: |
          set -euo pipefail
          Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

          mkdir -p "$RUNNER_TEMP/wayland-runtime"
          chmod 700 "$RUNNER_TEMP/wayland-runtime"
          echo "XDG_RUNTIME_DIR=$RUNNER_TEMP/wayland-runtime" >> "$GITHUB_ENV"
          echo "WAYLAND_DISPLAY=wayland-0" >> "$GITHUB_ENV"

          weston --backend=headless-backend.so --socket=wayland-0 --idle-time=0 >/tmp/weston.log 2>&1 &

          for _ in $(seq 1 50); do
            if [ -S "$RUNNER_TEMP/wayland-runtime/wayland-0" ]; then
              exit 0
            fi
            sleep 0.2
          done

          echo "Weston failed to create the Wayland socket" >&2
          cat /tmp/weston.log >&2 || true
          exit 1

      - name: Run tests
        run: cargo test -- --include-ignored

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs/src/**/*.md
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook (latest prebuilt binary)
        run: |
          set -euo pipefail
          MDBOOK_VERSION="$(curl -fsSL https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep -Po '"tag_name":\s*"\K[^"]+')"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mkdir -p "$HOME/.local/bin"
          mv mdbook "$HOME/.local/bin/mdbook"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook" --version

      - name: Build docs
        run: mdbook build docs
