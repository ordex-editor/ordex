name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LSP servers needed for tests
        run: |
          sudo apt-get update
          sudo apt-get install clangd python3-pylsp gopls wl-clipboard xclip weston xvfb
          sudo pip install ruff ty
          sudo npm install -g typescript-language-server

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Start clipboard test displays
        run: |
          set -euo pipefail
          Xvfb :99 -screen 0 1280x720x24 >/tmp/xvfb.log 2>&1 &
          export DISPLAY=:99
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

          for _ in $(seq 1 50); do
            if xdpyinfo -display "$DISPLAY" >/dev/null 2>&1; then
              break
            fi
            sleep 0.2
          done

          if ! xdpyinfo -display "$DISPLAY" >/dev/null 2>&1; then
            echo "Xvfb failed to accept X11 connections" >&2
            cat /tmp/xvfb.log >&2 || true
            exit 1
          fi

          WAYLAND_RUNTIME_DIR="$(mktemp -d "$RUNNER_TEMP/wayland-runtime.XXXXXX")"
          chmod 700 "$WAYLAND_RUNTIME_DIR"
          export XDG_RUNTIME_DIR="$WAYLAND_RUNTIME_DIR"
          export WAYLAND_DISPLAY=wayland-0
          echo "XDG_RUNTIME_DIR=$WAYLAND_RUNTIME_DIR" >> "$GITHUB_ENV"
          echo "WAYLAND_DISPLAY=wayland-0" >> "$GITHUB_ENV"

          weston --backend=x11-backend.so --renderer=pixman --socket=wayland-0 --idle-time=0 >/tmp/weston.log 2>&1 &
          weston_pid=$!
          weston_ready=false

          for _ in $(seq 1 50); do
            if [ -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ] && kill -0 "$weston_pid" 2>/dev/null; then
              weston_ready=true
              break
            fi
            if ! kill -0 "$weston_pid" 2>/dev/null; then
              break
            fi
            sleep 0.2
          done

          if [ "$weston_ready" = true ]; then
            exit 0
          fi

          echo "Weston failed to create the Wayland socket" >&2
          cat /tmp/weston.log >&2 || true
          wait "$weston_pid" || true
          exit 1

      - name: Run tests
        run: cargo test -- --include-ignored

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs/src/**/*.md
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook (latest prebuilt binary)
        run: |
          set -euo pipefail
          MDBOOK_VERSION="$(curl -fsSL https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep -Po '"tag_name":\s*"\K[^"]+')"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mkdir -p "$HOME/.local/bin"
          mv mdbook "$HOME/.local/bin/mdbook"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook" --version

      - name: Build docs
        run: mdbook build docs
