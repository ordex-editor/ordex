name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LSP servers needed for tests
        run: |
          sudo apt-get update
          sudo apt-get install clangd python3-pylsp gopls wl-clipboard xclip weston xvfb
          sudo pip install ruff ty
          sudo npm install -g typescript-language-server

      - name: Checkout
        uses: actions/checkout@v4

      - uses: taiki-e/install-action@nextest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: |
          set -euo pipefail
          xvfb-run -a --server-args="-screen 0 1280x720x24" bash <<'EOF'
          set -euo pipefail
          RUNTIME_DIR="$(mktemp -d)"
          WESTON_PID=
          WESTON_READY=false

          cleanup() {
            if [ -n "$WESTON_PID" ]; then
              kill "$WESTON_PID" 2>/dev/null || true
            fi
            rm -rf "$RUNTIME_DIR"
          }

          trap cleanup EXIT
          chmod 700 "$RUNTIME_DIR"
          export XDG_RUNTIME_DIR="$RUNTIME_DIR"
          export WAYLAND_DISPLAY=wayland-0

          weston --backend=x11-backend.so --renderer=pixman --socket=wayland-0 --idle-time=0 >/tmp/weston.log 2>&1 &
          WESTON_PID=$!

          for _ in $(seq 1 150); do
            if ! kill -0 "$WESTON_PID" 2>/dev/null; then
              break
            fi
            if [ -S "$XDG_RUNTIME_DIR/$WAYLAND_DISPLAY" ]; then
              sleep 0.2
              if kill -0 "$WESTON_PID" 2>/dev/null; then
                WESTON_READY=true
                break
              fi
              break
            fi
            sleep 0.2
          done

          if [ "$WESTON_READY" != true ]; then
            echo "Weston failed to initialize for clipboard tests after 30 seconds" >&2
            cat /tmp/weston.log >&2 || true
            exit 1
          fi

          cargo nextest run --profile ci -- --include-ignored
          EOF

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs/src/**/*.md
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build docs
        run: mdbook build docs
