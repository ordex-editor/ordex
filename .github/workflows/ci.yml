name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Install LSP servers needed for tests
        run: |
          sudo apt-get install clangd python3-pylsp golang-go
          sudo pip install ruff ty
          sudo npm install -g typescript-language-server
          go install golang.org/x/tools/gopls@v0.16.2
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-analyzer

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test -- --include-ignored

  link-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check links in Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md docs/src/**/*.md
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook (latest prebuilt binary)
        run: |
          set -euo pipefail
          MDBOOK_VERSION="$(curl -fsSL https://api.github.com/repos/rust-lang/mdBook/releases/latest | grep -Po '"tag_name":\s*"\K[^"]+')"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          mkdir -p "$HOME/.local/bin"
          mv mdbook "$HOME/.local/bin/mdbook"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mdbook" --version

      - name: Build docs
        run: mdbook build docs
